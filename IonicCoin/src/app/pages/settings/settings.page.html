<ion-header>
  <ion-toolbar>
    <ion-title>⚙️ Configurações</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <h2>IonicCoin</h2>

  <p>
    Aplicativo para conversão de moedas em tempo real.
  </p>


  <ion-item>

  <ion-label>
    Frequência de atualização
  </ion-label>

  <ion-select
    [(ngModel)]="updateFrequency"
    (ionChange)="saveSettings()">

    <ion-select-option value="1h">
      A cada hora
    </ion-select-option>

    <ion-select-option value="24h">
      Diariamente
    </ion-select-option>

  </ion-select>

</ion-item>

  

  <ion-button
    expand="block"
    color="primary"
    routerLink="/converter">

    Voltar ao Conversor

  </ion-button>

  <ion-button
    expand="block"
    color="success"
    routerLink="/history">

    Ver Histórico

  </ion-button>

</ion-content>
